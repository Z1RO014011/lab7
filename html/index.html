<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZhangHanrui (Daniel) Lab 07 Production</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #eef2f7;
        color: #1f2937;
      }

      main {
        max-width: 900px;
        margin: 64px auto;
        padding: 32px;
        background: #ffffff;
        border: 1px solid #d9e1ec;
        border-radius: 8px;
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 32px;
        align-items: center;
      }

      img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #d1d5db;
      }

      h1 {
        margin: 0 0 12px;
        color: #111827;
      }

      .meta {
        margin: 0 0 20px;
        color: #4b5563;
        font-weight: 700;
      }

      .profile {
        margin: 0;
        line-height: 1.7;
      }

      .environment {
        display: inline-block;
        margin-bottom: 16px;
        padding: 6px 10px;
        background: #111827;
        color: #ffffff;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
      }

      @media (max-width: 720px) {
        main {
          margin: 24px;
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="profile.jpg" alt="Profile image for ZhangHanrui Daniel">
      <section>
        <span class="environment">Production Server</span>
        <h1>ZhangHanrui (Daniel)</h1>
        <p class="meta">Student ID: 20232098</p>
        <p class="profile">
          This is my Lab 07 production deployment page. It is deployed from the
          prod branch with GitHub Actions, SSH, SCP, and Nginx to a separate AWS
          EC2 production server.
        </p>
      </section>
    </main>
  </body>
</html>
